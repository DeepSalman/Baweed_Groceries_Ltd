<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Baweed Groceries</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-green-50 flex items-center justify-center p-4">

    <div class="card w-full max-w-md bg-white shadow-xl">
        <div class="card-body gap-4">

            <!-- Header -->
            <div class="text-center">
                <a href="/" class="text-2xl font-bold text-green-700">Baweed Groceries Ltd</a>
                <p class="text-gray-500 text-sm mt-1">Sign in to your account</p>
            </div>

            <!-- Error alert -->
            <div id="errorAlert" class="alert alert-error hidden">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span id="errorMsg"></span>
            </div>

            <!-- Form -->
            <form id="loginForm" class="flex flex-col gap-3">
                <div class="form-control">
                    <label class="label"><span class="label-text font-medium">Email address</span></label>
                    <input type="email" id="email" placeholder="you@example.com"
                           class="input input-bordered w-full" required />
                </div>

                <div class="form-control">
                    <label class="label"><span class="label-text font-medium">Password</span></label>
                    <input type="password" id="password" placeholder="Enter your password"
                           class="input input-bordered w-full" required />
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary w-full mt-2">
                    Login
                </button>
            </form>

            <div class="divider text-xs text-gray-400">OR</div>

            <p class="text-center text-sm text-gray-600">
                Don't have an account?
                <a href="/register.html" class="text-green-600 font-semibold hover:underline">Register here</a>
            </p>
            <p class="text-center text-xs text-gray-400">
                <a href="/admin/login.html" class="hover:underline">Admin portal</a>
            </p>

        </div>
    </div>

    <script>
        // Redirect if already logged in
        fetch('/api/auth/me').then(r => r.json()).then(data => {
            if (data.user) {
                window.location.href = data.user.role === 'admin' ? '/admin/dashboard.html' : '/products.html';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn      = document.getElementById('submitBtn');
            const errDiv   = document.getElementById('errorAlert');
            const errMsg   = document.getElementById('errorMsg');

            btn.disabled    = true;
            btn.textContent = 'Please wait...';
            errDiv.classList.add('hidden');

            try {
                const res  = await fetch('/api/auth/login', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({
                        email:    document.getElementById('email').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();

                if (res.ok) {
                    window.location.href = data.redirect;
                } else {
                    errMsg.textContent = data.error;
                    errDiv.classList.remove('hidden');
                }
            } catch {
                errMsg.textContent = 'Something went wrong. Please try again.';
                errDiv.classList.remove('hidden');
            } finally {
                btn.disabled    = false;
                btn.textContent = 'Login';
            }
        });
    </script>

</body>
</html>
