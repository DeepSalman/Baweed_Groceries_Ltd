<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Dashboard - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div class="drawer lg:drawer-open">
    <input id="d" type="checkbox" class="drawer-toggle">
    <div class="drawer-content flex flex-col min-h-screen">
        <div class="navbar bg-gray-900 text-white lg:hidden px-4 py-2 sticky top-0 z-10">
            <label for="d" class="btn btn-ghost btn-sm text-white mr-2">&#9776;</label>
            <span class="font-bold">Admin Panel</span>
        </div>
        <main class="flex-1 p-4 md:p-6">

            <h1 class="text-2xl font-bold text-gray-800 mb-6">Dashboard</h1>

            <!-- Stat cards -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                <div class="card bg-white shadow-sm">
                    <div class="card-body p-4">
                        <p class="text-xs text-gray-400 uppercase tracking-wide">Total Orders</p>
                        <p id="statOrders" class="text-3xl font-bold text-gray-800 mt-1">-</p>
                    </div>
                </div>
                <div class="card bg-white shadow-sm">
                    <div class="card-body p-4">
                        <p class="text-xs text-gray-400 uppercase tracking-wide">Total Revenue</p>
                        <p id="statRevenue" class="text-3xl font-bold text-green-600 mt-1">-</p>
                    </div>
                </div>
                <div class="card bg-white shadow-sm">
                    <div class="card-body p-4">
                        <p class="text-xs text-gray-400 uppercase tracking-wide">Customers</p>
                        <p id="statCustomers" class="text-3xl font-bold text-gray-800 mt-1">-</p>
                    </div>
                </div>
                <div class="card bg-white shadow-sm">
                    <div class="card-body p-4">
                        <p class="text-xs text-gray-400 uppercase tracking-wide">Low Stock Items</p>
                        <p id="statLow" class="text-3xl font-bold text-orange-500 mt-1">-</p>
                    </div>
                </div>
            </div>

            <!-- Recent orders -->
            <div class="card bg-white shadow-sm">
                <div class="card-body p-4">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="font-bold text-gray-700">Recent Orders</h2>
                        <a href="/admin/orders.html" class="text-xs text-green-600 hover:underline">View all</a>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="table table-sm">
                            <thead><tr class="text-gray-400 text-xs">
                                <th>Order #</th><th>Customer</th>
                                <th>Amount</th><th>Status</th><th>Date</th>
                            </tr></thead>
                            <tbody id="recentOrders">
                                <tr><td colspan="5" class="text-center py-4">
                                    <span class="loading loading-spinner text-primary"></span>
                                </td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>
    <div class="drawer-side z-20">
        <label for="d" class="drawer-overlay"></label>
        <div id="adminSidebar"></div>
    </div>
</div>
<script src="/js/admin-sidebar.js"></script>
<script>
    const STATUS_COLORS = {
        pending:'badge-warning', processing:'badge-info',
        dispatched:'badge-primary', delivered:'badge-success', cancelled:'badge-error'
    };

    async function loadDashboard() {
        const res  = await fetch('/api/admin/stats');
        const data = await res.json();

        document.getElementById('statOrders').textContent    = data.total_orders;
        document.getElementById('statRevenue').textContent   = `£${data.total_revenue}`;
        document.getElementById('statCustomers').textContent = data.total_customers;
        document.getElementById('statLow').textContent       = data.low_stock_count;

        document.getElementById('recentOrders').innerHTML =
            (data.recent_orders || []).length === 0
                ? `<tr><td colspan="5" class="text-center text-gray-400 py-4">No orders yet</td></tr>`
                : data.recent_orders.map(o => `
                    <tr>
                        <td class="font-mono text-xs">#${String(o.id).padStart(5,'0')}</td>
                        <td>${o.customer_name || 'Guest'}</td>
                        <td class="font-semibold">£${parseFloat(o.total_amount).toFixed(2)}</td>
                        <td><span class="badge badge-sm ${STATUS_COLORS[o.status] || ''}">${o.status}</span></td>
                        <td class="text-xs text-gray-400">${new Date(o.created_at).toLocaleDateString('en-GB')}</td>
                    </tr>`).join('');
    }

    initAdmin();
    loadDashboard();
</script>
</body></html>
