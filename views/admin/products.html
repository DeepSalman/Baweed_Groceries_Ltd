<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Products - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div class="drawer lg:drawer-open">
    <input id="d" type="checkbox" class="drawer-toggle">
    <div class="drawer-content flex flex-col min-h-screen">
        <div class="navbar bg-gray-900 text-white lg:hidden px-4 py-2 sticky top-0 z-10">
            <label for="d" class="btn btn-ghost btn-sm text-white mr-2">&#9776;</label>
            <span class="font-bold">Products</span>
        </div>
        <main class="flex-1 p-4 md:p-6">

            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-gray-800">Products</h1>
                <button onclick="openModal()" class="btn btn-primary btn-sm">+ Add Product</button>
            </div>

            <div class="card bg-white shadow-sm overflow-x-auto">
                <table class="table">
                    <thead><tr class="text-gray-400 text-xs bg-gray-50">
                        <th>ID</th><th>Name</th><th>Price</th><th>Stock</th><th>Description</th><th>Actions</th>
                    </tr></thead>
                    <tbody id="productsTable">
                        <tr><td colspan="6" class="text-center py-8">
                            <span class="loading loading-spinner text-primary"></span>
                        </td></tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>
    <div class="drawer-side z-20">
        <label for="d" class="drawer-overlay"></label>
        <div id="adminSidebar"></div>
    </div>
</div>

<!-- Modal -->
<div id="modal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center">
    <div class="bg-white rounded-2xl w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
        <div class="p-6">
            <h3 id="modalTitle" class="text-lg font-bold text-gray-800 mb-4">Add Product</h3>
            <form id="productForm" enctype="multipart/form-data" class="space-y-3">
                <input type="hidden" id="editId"/>
                <div class="form-control">
                    <label class="label"><span class="label-text font-medium">Product name</span></label>
                    <input id="pName" name="name" type="text" class="input input-bordered" required/>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium">Price (£)</span></label>
                        <input id="pPrice" name="price" type="number" step="0.01" min="0" class="input input-bordered" required/>
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium">Stock quantity</span></label>
                        <input id="pStock" name="stock_quantity" type="number" min="0" class="input input-bordered"/>
                    </div>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text font-medium">Description</span></label>
                    <textarea id="pDesc" name="description" class="textarea textarea-bordered" rows="2"></textarea>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text font-medium">Product image <span class="text-gray-400">(optional)</span></span></label>
                    <input name="image" type="file" accept="image/*" class="file-input file-input-bordered file-input-sm w-full"/>
                </div>
                <div id="modalError" class="text-error text-sm hidden"></div>
                <div class="flex justify-end gap-2 pt-2">
                    <button type="button" onclick="closeModal()" class="btn btn-ghost btn-sm">Cancel</button>
                    <button type="submit" class="btn btn-primary btn-sm">Save Product</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="/js/admin-sidebar.js"></script>
<script>
    let products = [];

    async function load() {
        const res  = await fetch('/api/admin/products');
        const data = await res.json();
        products   = data.products || [];
        render(products);
    }

    function render(list) {
        document.getElementById('productsTable').innerHTML = list.length === 0
            ? `<tr><td colspan="6" class="text-center py-8 text-gray-400">No products found</td></tr>`
            : list.map(p => `
                <tr class="hover">
                    <td class="text-gray-400 text-xs">${p.id}</td>
                    <td class="font-medium">${p.name}</td>
                    <td class="font-semibold text-green-700">£${parseFloat(p.price).toFixed(2)}</td>
                    <td><span class="${p.stock_quantity < 20 ? 'text-orange-500 font-bold' : ''}">${p.stock_quantity}</span></td>
                    <td class="text-xs text-gray-400 max-w-xs truncate">${p.description || '—'}</td>
                    <td class="flex gap-2">
                        <button onclick="openEdit(${p.id})" class="btn btn-xs btn-ghost text-blue-600">Edit</button>
                        <button onclick="del(${p.id})" class="btn btn-xs btn-ghost text-red-500">Delete</button>
                    </td>
                </tr>`).join('');
    }

    function openModal() {
        document.getElementById('editId').value = '';
        document.getElementById('modalTitle').textContent = 'Add Product';
        document.getElementById('productForm').reset();
        document.getElementById('modalError').classList.add('hidden');
        document.getElementById('modal').classList.remove('hidden');
        document.getElementById('modal').classList.add('flex');
    }

    function openEdit(id) {
        const p = products.find(x => x.id === id);
        document.getElementById('editId').value   = p.id;
        document.getElementById('pName').value    = p.name;
        document.getElementById('pPrice').value   = p.price;
        document.getElementById('pStock').value   = p.stock_quantity;
        document.getElementById('pDesc').value    = p.description || '';
        document.getElementById('modalTitle').textContent = 'Edit Product';
        document.getElementById('modalError').classList.add('hidden');
        document.getElementById('modal').classList.remove('hidden');
        document.getElementById('modal').classList.add('flex');
    }

    function closeModal() {
        document.getElementById('modal').classList.add('hidden');
        document.getElementById('modal').classList.remove('flex');
    }

    document.getElementById('productForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id       = document.getElementById('editId').value;
        const url      = id ? `/api/admin/products/${id}` : '/api/admin/products';
        const method   = id ? 'PUT' : 'POST';
        const formData = new FormData(document.getElementById('productForm'));

        const res  = await fetch(url, { method, body: formData });
        const data = await res.json();
        if (res.ok) {
            closeModal();
            load();
            showToast(id ? 'Product updated' : 'Product added');
        } else {
            const err = document.getElementById('modalError');
            err.textContent = data.error;
            err.classList.remove('hidden');
        }
    });

    async function del(id) {
        if (!confirm('Delete this product?')) return;
        const res  = await fetch(`/api/admin/products/${id}`, { method: 'DELETE' });
        const data = await res.json();
        res.ok ? (load(), showToast('Product deleted')) : alert(data.error);
    }

    initAdmin();
    load();
</script>
</body></html>
