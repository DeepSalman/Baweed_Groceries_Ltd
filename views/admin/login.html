<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Baweed Groceries</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-900 flex items-center justify-center p-4">

    <div class="card w-full max-w-sm bg-gray-800 shadow-2xl border border-gray-700">
        <div class="card-body gap-4">

            <!-- Header -->
            <div class="text-center">
                <p class="text-xs text-gray-400 uppercase tracking-widest mb-1">Baweed Groceries Ltd</p>
                <h1 class="text-2xl font-bold text-white">Admin Portal</h1>
                <p class="text-gray-400 text-sm mt-1">Restricted access</p>
            </div>

            <!-- Error alert -->
            <div id="errorAlert" class="alert alert-error hidden">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span id="errorMsg"></span>
            </div>

            <!-- Form -->
            <form id="loginForm" class="flex flex-col gap-3">

                <div class="form-control">
                    <label class="label"><span class="label-text text-gray-300">Email address</span></label>
                    <input type="email" id="email" placeholder="admin@baweed.com"
                           class="input input-bordered bg-gray-700 border-gray-600 text-white w-full" required />
                </div>

                <div class="form-control">
                    <label class="label"><span class="label-text text-gray-300">Password</span></label>
                    <input type="password" id="password" placeholder="Enter password"
                           class="input input-bordered bg-gray-700 border-gray-600 text-white w-full" required />
                </div>

                <button type="submit" id="submitBtn" class="btn btn-success w-full mt-2">
                    Sign In
                </button>

            </form>

            <p class="text-center text-xs text-gray-500">
                <a href="/" class="hover:text-gray-300">Back to store</a>
            </p>

        </div>
    </div>

    <script>
        // Redirect if already logged in as admin
        fetch('/api/auth/me').then(r => r.json()).then(data => {
            if (data.user && data.user.role === 'admin') {
                window.location.href = '/admin/dashboard.html';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn    = document.getElementById('submitBtn');
            const errDiv = document.getElementById('errorAlert');
            const errMsg = document.getElementById('errorMsg');

            btn.disabled    = true;
            btn.textContent = 'Please wait...';
            errDiv.classList.add('hidden');

            try {
                const res  = await fetch('/api/auth/login', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({
                        email:    document.getElementById('email').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();

                if (res.ok) {
                    if (data.role !== 'admin') {
                        errMsg.textContent = 'Access denied. Admin accounts only.';
                        errDiv.classList.remove('hidden');
                        // Clear the session we just created
                        await fetch('/api/auth/logout', { method: 'POST' });
                    } else {
                        window.location.href = '/admin/dashboard.html';
                    }
                } else {
                    errMsg.textContent = data.error;
                    errDiv.classList.remove('hidden');
                }
            } catch {
                errMsg.textContent = 'Something went wrong. Please try again.';
                errDiv.classList.remove('hidden');
            } finally {
                btn.disabled    = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>

</body>
</html>
