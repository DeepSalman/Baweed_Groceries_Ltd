<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Orders - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div class="drawer lg:drawer-open">
    <input id="d" type="checkbox" class="drawer-toggle">
    <div class="drawer-content flex flex-col min-h-screen">
        <div class="navbar bg-gray-900 text-white lg:hidden px-4 py-2 sticky top-0 z-10">
            <label for="d" class="btn btn-ghost btn-sm text-white mr-2">&#9776;</label>
            <span class="font-bold">Orders</span>
        </div>
        <main class="flex-1 p-4 md:p-6">

            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-gray-800">Orders</h1>
                <div class="flex gap-2 items-center">
                    <label class="text-xs text-gray-500">Filter:</label>
                    <select id="statusFilter" onchange="filterOrders()" class="select select-bordered select-xs">
                        <option value="">All</option>
                        <option>pending</option>
                        <option>processing</option>
                        <option>dispatched</option>
                        <option>delivered</option>
                        <option>cancelled</option>
                    </select>
                </div>
            </div>

            <div class="card bg-white shadow-sm overflow-x-auto">
                <table class="table">
                    <thead><tr class="text-gray-400 text-xs bg-gray-50">
                        <th>Order #</th><th>Customer</th><th>Email</th>
                        <th>Items</th><th>Total</th><th>Payment</th>
                        <th>Status</th><th>Date</th>
                    </tr></thead>
                    <tbody id="ordersTable">
                        <tr><td colspan="8" class="text-center py-8">
                            <span class="loading loading-spinner text-primary"></span>
                        </td></tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>
    <div class="drawer-side z-20">
        <label for="d" class="drawer-overlay"></label>
        <div id="adminSidebar"></div>
    </div>
</div>

<script src="/js/admin-sidebar.js"></script>
<script>
    const STATUS_COLORS = {
        pending:'badge-warning', processing:'badge-info',
        dispatched:'badge-primary', delivered:'badge-success', cancelled:'badge-error'
    };
    const PAY_COLORS = {
        paid:'badge-success', pending:'badge-warning', failed:'badge-error'
    };
    const STATUSES = ['pending','processing','dispatched','delivered','cancelled'];

    let allOrders = [];

    async function load() {
        const res  = await fetch('/api/admin/orders');
        const data = await res.json();
        allOrders  = data.orders || [];
        filterOrders();
    }

    function filterOrders() {
        const f = document.getElementById('statusFilter').value;
        render(f ? allOrders.filter(o => o.status === f) : allOrders);
    }

    function render(list) {
        document.getElementById('ordersTable').innerHTML = list.length === 0
            ? `<tr><td colspan="8" class="text-center py-8 text-gray-400">No orders found</td></tr>`
            : list.map(o => `
                <tr class="hover align-top">
                    <td class="font-mono text-xs pt-3">#${String(o.id).padStart(5,'0')}</td>
                    <td class="pt-3">
                        <p class="font-medium">${o.customer_name || 'Guest'}</p>
                        ${o.shipping_address ? `<p class="text-xs text-gray-400">${o.shipping_address}</p>` : ''}
                    </td>
                    <td class="text-xs text-gray-500 pt-3">${o.customer_email || '—'}</td>
                    <td class="text-xs text-gray-500 pt-3">
                        ${(o.items||[]).map(i => `${i.quantity}× ${i.name}`).join('<br>')}
                    </td>
                    <td class="font-semibold pt-3">£${parseFloat(o.total_amount).toFixed(2)}</td>
                    <td class="pt-3">
                        <span class="badge badge-sm ${PAY_COLORS[o.payment_status] || ''}">${o.payment_status}</span>
                    </td>
                    <td class="pt-2">
                        <select onchange="updateStatus(${o.id}, this.value)"
                                class="select select-bordered select-xs">
                            ${STATUSES.map(s =>
                                `<option value="${s}" ${s === o.status ? 'selected' : ''}>${s}</option>`
                            ).join('')}
                        </select>
                    </td>
                    <td class="text-xs text-gray-400 pt-3 whitespace-nowrap">
                        ${new Date(o.created_at).toLocaleDateString('en-GB')}
                    </td>
                </tr>`).join('');
    }

    async function updateStatus(id, status) {
        const res  = await fetch(`/api/admin/orders/${id}/status`, {
            method: 'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ status })
        });
        const data = await res.json();
        if (res.ok) {
            const o = allOrders.find(x => x.id === id);
            if (o) o.status = status;
            showToast(`Order #${String(id).padStart(5,'0')} → ${status}`);
        } else {
            alert(data.error);
            load();
        }
    }

    initAdmin();
    load();
</script>
</body></html>
