<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart - Baweed Groceries</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50">

    <div id="navbar"></div>

    <div class="max-w-6xl mx-auto px-4 py-8">

        <h1 class="text-3xl font-bold text-gray-800 mb-6">Shopping Cart</h1>

        <!-- Empty cart -->
        <div id="emptyCart" class="hidden text-center py-20">
            <p class="text-gray-400 text-xl mb-4">Your cart is empty</p>
            <a href="/products.html" class="btn btn-primary">Continue Shopping</a>
        </div>

        <!-- Cart content -->
        <div id="cartContent" class="hidden lg:flex gap-6">

            <!-- Items -->
            <div class="flex-1">
                <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                    <table class="table">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="text-gray-600">Product</th>
                                <th class="text-gray-600 text-center">Price</th>
                                <th class="text-gray-600 text-center">Quantity</th>
                                <th class="text-gray-600 text-right">Total</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="cartRows"></tbody>
                    </table>
                </div>
                <div class="flex justify-between mt-4">
                    <a href="/products.html" class="btn btn-ghost btn-sm">Continue Shopping</a>
                    <button onclick="clearCart()" class="btn btn-ghost btn-sm text-error">Clear Cart</button>
                </div>
            </div>

            <!-- Summary -->
            <div class="w-full lg:w-72 shrink-0">
                <div class="bg-white rounded-2xl shadow-sm p-6 sticky top-24">
                    <h2 class="text-lg font-bold text-gray-800 mb-4">Order Summary</h2>
                    <div class="space-y-3 text-sm">
                        <div class="flex justify-between text-gray-600">
                            <span>Subtotal</span>
                            <span id="subtotal">£0.00</span>
                        </div>
                        <div class="flex justify-between text-gray-600">
                            <span>Delivery</span>
                            <span class="text-green-600 font-medium">Free</span>
                        </div>
                        <div class="divider my-2"></div>
                        <div class="flex justify-between font-bold text-lg text-gray-800">
                            <span>Total</span>
                            <span id="total">£0.00</span>
                        </div>
                    </div>
                    <a href="/checkout.html" class="btn btn-primary w-full mt-6">Proceed to Checkout</a>
                </div>
            </div>

        </div>

        <!-- Mobile summary (shown below items on small screens) -->
        <div id="mobileSummary" class="hidden lg:hidden mt-6 bg-white rounded-2xl shadow-sm p-6">
            <div class="flex justify-between font-bold text-lg mb-4">
                <span>Total</span>
                <span id="totalMobile">£0.00</span>
            </div>
            <a href="/checkout.html" class="btn btn-primary w-full">Proceed to Checkout</a>
        </div>

    </div>

    <script src="/js/nav.js"></script>
    <script>
        async function loadCart() {
            const res  = await fetch('/api/cart');
            const data = await res.json();
            renderCart(data.items || [], data.total || '0.00');
        }

        function renderCart(items, total) {
            const emptyCart    = document.getElementById('emptyCart');
            const cartContent  = document.getElementById('cartContent');
            const mobileSummary = document.getElementById('mobileSummary');

            if (items.length === 0) {
                emptyCart.classList.remove('hidden');
                cartContent.classList.add('hidden');
                mobileSummary.classList.add('hidden');
                return;
            }

            emptyCart.classList.add('hidden');
            cartContent.classList.remove('hidden');
            cartContent.classList.add('flex');
            mobileSummary.classList.remove('hidden');

            document.getElementById('cartRows').innerHTML = items.map(item => `
                <tr>
                    <td>
                        <div class="font-medium text-gray-800">${item.name}</div>
                        <div class="text-xs text-gray-400">£${item.price.toFixed(2)} each</div>
                    </td>
                    <td class="text-center text-gray-700">£${item.price.toFixed(2)}</td>
                    <td>
                        <div class="flex items-center justify-center gap-2">
                            <button onclick="updateQty(${item.product_id}, ${item.quantity - 1})"
                                    class="btn btn-xs btn-ghost border border-gray-200">-</button>
                            <span class="w-8 text-center font-medium">${item.quantity}</span>
                            <button onclick="updateQty(${item.product_id}, ${item.quantity + 1})"
                                    class="btn btn-xs btn-ghost border border-gray-200">+</button>
                        </div>
                    </td>
                    <td class="text-right font-semibold text-gray-800">
                        £${(item.price * item.quantity).toFixed(2)}
                    </td>
                    <td>
                        <button onclick="removeItem(${item.product_id})"
                                class="btn btn-xs btn-ghost text-error">Remove</button>
                    </td>
                </tr>
            `).join('');

            const display = `£${parseFloat(total).toFixed(2)}`;
            document.getElementById('subtotal').textContent    = display;
            document.getElementById('total').textContent       = display;
            document.getElementById('totalMobile').textContent = display;
        }

        async function updateQty(productId, newQty) {
            const res  = await fetch('/api/cart/update', {
                method:  'PUT',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ product_id: productId, quantity: newQty })
            });
            const data = await res.json();
            if (res.ok) {
                renderCart(data.items, data.total);
                loadNav();
            }
        }

        async function removeItem(productId) {
            const res  = await fetch(`/api/cart/remove/${productId}`, { method: 'DELETE' });
            const data = await res.json();
            if (res.ok) {
                renderCart(data.items, data.total);
                loadNav();
            }
        }

        async function clearCart() {
            await fetch('/api/cart/clear', { method: 'DELETE' });
            renderCart([], '0.00');
            loadNav();
        }

        loadCart();
    </script>

</body>
</html>
